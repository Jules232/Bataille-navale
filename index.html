<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useCallback, useRef } from 'react';
import { initializeApp } from 'firebase/app';
import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, getDocs, getDoc, deleteDoc } from 'firebase/firestore';
import { Crosshair, Zap, Anchor, RotateCw, Play, Search, Target, ShieldQuestion, ShieldAlert, Waves, Map, Flame, Info, X, Circle } from 'lucide-react';
import { createRoot } from 'react-dom/client';

// --- Configuration Firebase ---
const fallbackFirebaseConfig = {
    apiKey: "AIzaSyDct8USnQM78QdVHxmg4P94fejPacfc6RA",
    authDomain: "aurabienveillance.firebaseapp.com",
    projectId: "aurabienveillance",
    storageBucket: "aurabienveillance.firebasestorage.app",
    messagingSenderId: "320221952933",
    appId: "1:320221952933:web:a68a41f2d00154d9ab464c",
    measurementId: "G-1TSHGWEF7L"
};

const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackFirebaseConfig;
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const appId = typeof __app_id !== 'undefined' ? __app_id : 'bataille-navale-app';

// --- Constantes du Jeu ---
const MAP_SIZES = {
    10: { name: "Tactique (10x10)" },
    16: { name: "Stratégique (16x16)" },
    24: { name: "Océanique (24x24)" }
};

const FLEET_MODES = {
    FEW: { name: "Rapide (3 navires)", ships: [4, 3, 2] },
    NORMAL: { name: "Classique (5 navires)", ships: [5, 4, 3, 3, 2] },
    MANY: { name: "Armada (8 navires)", ships: [5, 4, 4, 3, 3, 2, 2, 2] }
};

// --- Utilitaires Audio ---
const playBeep = (freq = 600, duration = 0.1, vol = 0.1) => {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.value = vol;
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration);
    } catch (e) {
        // Ignoré silencieusement si l'audio n'est pas supporté ou bloqué par le navigateur
    }
};

export default function BatailleNavale() {
    // --- États Globaux ---
    const [user, setUser] = useState(null);
    const [gameState, setGameState] = useState('MENU');
    const [gameMode, setGameMode] = useState('ONLINE');
    const [fleetMode, setFleetMode] = useState('NORMAL');
    const [mapSize, setMapSize] = useState(10);
    
    // --- États du Match ---
    const [gameId, setGameId] = useState(null);
    const [playerNum, setPlayerNum] = useState(1);
    const [currentTurn, setCurrentTurn] = useState(1);
    const [winner, setWinner] = useState(null);
    
    // --- États de la Grille ---
    const [myShips, setMyShips] = useState([]);
    const [myShots, setMyShots] = useState([]); 
    const [opponentShips, setOpponentShips] = useState([]);
    const [opponentShots, setOpponentShots] = useState([]);
    
    // --- États de Placement ---
    const [shipsToPlace, setShipsToPlace] = useState([]);
    const [currentShipIndex, setCurrentShipIndex] = useState(0);
    const [placementDir, setPlacementDir] = useState('H');
    const [hoverPos, setHoverPos] = useState(null);

    // --- États du Bonus Loupe ---
    const [radarCharges, setRadarCharges] = useState(0);
    const [isRadarActive, setIsRadarActive] = useState(false);
    const [radarGlow, setRadarGlow] = useState(null);
    const [lastBeepCell, setLastBeepCell] = useState(null);
    const radarTimeoutRef = useRef(null);

    // --- IA du Bot ---
    const botTimeoutRef = useRef(null);
    const [botLastHits, setBotLastHits] = useState([]);

    // 1. Initialisation Auth
    useEffect(() => {
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Erreur d'authentification Firebase", err);
            }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => setUser(u));
        return () => unsubscribe();
    }, []);

    // 2. Synchronisation Firebase (Multiplayer) - Optimisée sans gameState dans les dépendances
    useEffect(() => {
        if (!user || gameMode !== 'ONLINE' || !gameId) return;

        const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId);
        const unsubscribe = onSnapshot(gameRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                
                setMapSize(data.mapSize);
                
                setGameState(prev => {
                    if (prev === 'MATCHMAKING' && data.player2) {
                        const lengths = FLEET_MODES[data.fleetMode].ships;
                        setShipsToPlace(lengths.map((len, i) => ({ id: i, length: len })));
                        setCurrentShipIndex(0);
                        setMyShips([]);
                        setPlacementDir('H');
                        return 'PLACEMENT';
                    }
                    if (prev === 'WAITING_OPPONENT' && data.p1Ready && data.p2Ready) {
                        return 'PLAYING';
                    }
                    if (data.winner && prev !== 'FINISHED') {
                        return 'FINISHED';
                    }
                    return prev;
                });

                if (data.p1Ready && data.p2Ready) {
                    setOpponentShips(playerNum === 1 ? data.p2Ships : data.p1Ships);
                }

                if (data.status === 'playing' || data.status === 'finished') {
                    setCurrentTurn(data.turn);
                    setOpponentShots(playerNum === 1 ? data.p2Shots : data.p1Shots);
                    setMyShots(playerNum === 1 ? data.p1Shots : data.p2Shots);
                    
                    if (data.winner) {
                        setWinner(data.winner);
                    }
                }
            } else {
                // Le document a été supprimé (ex: adversaire a quitté)
                setGameState(prev => {
                    if (prev !== 'FINISHED' && prev !== 'MENU') {
                        setGameId(null);
                        setMyShips([]);
                        setMyShots([]);
                        setOpponentShips([]);
                        setOpponentShots([]);
                        setRadarCharges(0);
                        setIsRadarActive(false);
                        setBotLastHits([]);
                        return 'MENU';
                    }
                    return prev;
                });
            }
        }, (err) => console.error("Erreur de synchronisation réseau:", err));

        return () => unsubscribe();
    }, [user, gameId, gameMode, playerNum]);

    // 3. IA : Obtenir la cible du bot
    const getBotTarget = useCallback(() => {
        let x, y;
        // Le bot a touché un navire précédemment
        if (botLastHits.length > 0) {
            const last = botLastHits[botLastHits.length - 1];
            const neighbors = [
                {x: last.x+1, y: last.y}, {x: last.x-1, y: last.y},
                {x: last.x, y: last.y+1}, {x: last.x, y: last.y-1}
            ].filter(n => n.x >= 0 && n.x < mapSize && n.y >= 0 && n.y < mapSize);
            
            const unshotNeighbors = neighbors.filter(n => !opponentShots.some(s => s.x === n.x && s.y === n.y));
            
            if (unshotNeighbors.length > 0) {
                return unshotNeighbors[Math.floor(Math.random() * unshotNeighbors.length)];
            }
        }
        
        // Tir aléatoire
        do {
            x = Math.floor(Math.random() * mapSize);
            y = Math.floor(Math.random() * mapSize);
        } while (opponentShots.some(s => s.x === x && s.y === y));
        
        return {x, y};
    }, [botLastHits, opponentShots, mapSize]);

    // 4. Boucle d'action du Bot
    useEffect(() => {
        if (gameMode === 'BOT' && gameState === 'PLAYING' && currentTurn === 2) {
            botTimeoutRef.current = setTimeout(() => {
                const {x, y} = getBotTarget();
                handleFire(x, y, true);
            }, 800);
        }
        return () => clearTimeout(botTimeoutRef.current);
    }, [currentTurn, gameState, gameMode, getBotTarget]);

    // --- Actions Principales ---

    const initPlacement = (modeStr) => {
        const lengths = FLEET_MODES[modeStr].ships;
        setShipsToPlace(lengths.map((len, i) => ({ id: i, length: len })));
        setCurrentShipIndex(0);
        setMyShips([]);
        setPlacementDir('H');
    };

    const startGame = async () => {
        if (!user) return;
        
        if (gameMode === 'BOT') {
            initPlacement(fleetMode);
            setPlayerNum(1);
            setGameState('PLACEMENT');
            
            // Placement automatisé et sécurisé de la flotte du Bot
            let botFleet = [];
            const lengths = FLEET_MODES[fleetMode].ships;
            lengths.forEach((len, i) => {
                let placed = false;
                while(!placed) {
                    let d = Math.random() < 0.5 ? 'H' : 'V';
                    let tx = Math.floor(Math.random() * (d === 'H' ? mapSize - len + 1 : mapSize));
                    let ty = Math.floor(Math.random() * (d === 'V' ? mapSize - len + 1 : mapSize));
                    if (isPlacementValid(tx, ty, len, d, botFleet)) {
                        botFleet.push({ id: i, length: len, x: tx, y: ty, direction: d });
                        placed = true;
                    }
                }
            });
            setOpponentShips(botFleet);
        } else {
            // Mode en Ligne : Recherche de partie
            setGameState('MATCHMAKING');
            const gamesRef = collection(db, 'artifacts', appId, 'public', 'data', 'games');
            
            try {
                const snap = await getDocs(gamesRef);
                let foundGameId = null;
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    if (data.status === 'waiting' && data.fleetMode === fleetMode && data.mapSize === mapSize && data.player1 !== user.uid) {
                        foundGameId = docSnap.id;
                    }
                });

                if (foundGameId) {
                    await updateDoc(doc(gamesRef, foundGameId), {
                        player2: user.uid,
                        status: 'placement'
                    });
                    setGameId(foundGameId);
                    setPlayerNum(2);
                } else {
                    const newGameRef = doc(gamesRef);
                    await setDoc(newGameRef, {
                        status: 'waiting',
                        fleetMode: fleetMode,
                        mapSize: mapSize,
                        player1: user.uid,
                        player2: null,
                        p1Ready: false,
                        p2Ready: false,
                        turn: 1,
                        p1Ships: [], p2Ships: [],
                        p1Shots: [], p2Shots: [],
                        winner: null,
                        createdAt: Date.now()
                    });
                    setGameId(newGameRef.id);
                    setPlayerNum(1);
                }
            } catch(e) {
                console.error("Matchmaking error:", e);
                setGameState('MENU');
            }
        }
    };

    const isPlacementValid = (x, y, length, dir, currentShips) => {
        // Hors limites
        if (dir === 'H' && x + length > mapSize) return false;
        if (dir === 'V' && y + length > mapSize) return false;

        // Collisions
        for (let ship of currentShips) {
            for (let i = 0; i < length; i++) {
                let px = dir === 'H' ? x + i : x;
                let py = dir === 'V' ? y + i : y;
                
                for (let j = 0; j < ship.length; j++) {
                    let sx = ship.direction === 'H' ? ship.x + j : ship.x;
                    let sy = ship.direction === 'V' ? ship.y + j : ship.y;
                    if (px === sx && py === sy) return false;
                }
            }
        }
        return true;
    };

    const handleGridClickPlacement = (x, y) => {
        if (currentShipIndex >= shipsToPlace.length) return;
        const currentShip = shipsToPlace[currentShipIndex];
        
        if (isPlacementValid(x, y, currentShip.length, placementDir, myShips)) {
            setMyShips([...myShips, { ...currentShip, x, y, direction: placementDir }]);
            setCurrentShipIndex(currentShipIndex + 1);
            playBeep(500, 0.1, 0.2);
        } else {
            playBeep(200, 0.15, 0.2);
        }
    };

    const validatePlacement = async () => {
        if (gameMode === 'BOT') {
            setGameState('PLAYING');
            setCurrentTurn(1);
            playBeep(600, 0.3, 0.2);
        } else {
            setGameState('WAITING_OPPONENT');
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId);
            const updateData = playerNum === 1 ? { p1Ships: myShips, p1Ready: true } : { p2Ships: myShips, p2Ready: true };
            await updateDoc(gameRef, updateData);
            
            // Résolution des conditions de départ via document direct pour performances optimisées
            const docSnap = await getDoc(gameRef);
            if (docSnap.exists()) {
                const currentDoc = docSnap.data();
                if ((playerNum === 1 && currentDoc.p2Ready) || (playerNum === 2 && currentDoc.p1Ready)) {
                    await updateDoc(gameRef, { status: 'playing' });
                }
            }
        }
    };

    const checkSunkShip = (x, y, targetShips, allShots) => {
        for (let ship of targetShips) {
            let hits = 0;
            let isHitOnThisShip = false;
            for (let i = 0; i < ship.length; i++) {
                let sx = ship.direction === 'H' ? ship.x + i : ship.x;
                let sy = ship.direction === 'V' ? ship.y + i : ship.y;
                if (sx === x && sy === y) isHitOnThisShip = true;
                
                if (allShots.some(s => s.x === sx && s.y === sy && s.status === 'hit') || (sx === x && sy === y)) {
                    hits++;
                }
            }
            if (isHitOnThisShip && hits === ship.length) {
                return true; 
            }
        }
        return false;
    };

    const checkWin = (targetShips, allShots) => {
        let totalHitsNeeded = targetShips.reduce((acc, ship) => acc + ship.length, 0);
        let currentHits = allShots.filter(s => s.status === 'hit').length;
        return currentHits >= totalHitsNeeded;
    };

    const handleFire = async (x, y, isBot = false) => {
        const actorNum = isBot ? 2 : playerNum;
        if (gameState !== 'PLAYING' || currentTurn !== actorNum) return;

        const currentShots = isBot ? opponentShots : myShots;
        // Règle: Interdiction de tirer deux fois au même endroit
        if (currentShots.some(s => s.x === x && s.y === y)) return;

        const targetShips = isBot ? myShips : opponentShips;
        
        let isHit = false;
        targetShips.forEach(ship => {
            for (let i = 0; i < ship.length; i++) {
                let sx = ship.direction === 'H' ? ship.x + i : ship.x;
                let sy = ship.direction === 'V' ? ship.y + i : ship.y;
                if (sx === x && sy === y) isHit = true;
            }
        });

        const newShot = { x, y, status: isHit ? 'hit' : 'miss' };
        const updatedShots = [...currentShots, newShot];

        if (isHit) {
            playBeep(100, 0.4, 0.3); // Son grave
            const sunk = checkSunkShip(x, y, targetShips, updatedShots);
            
            if (!isBot) {
                if (sunk) {
                    setRadarCharges(c => c + 1);
                    playBeep(800, 0.2, 0.2); setTimeout(()=>playBeep(1200, 0.4, 0.2), 200);
                }
            } else {
                if (sunk) {
                    // IA Corrigée : Le bot a coulé le navire, il arrête de s'acharner autour et efface sa mémoire de cibles
                    setBotLastHits([]); 
                } else {
                    setBotLastHits(prev => [...prev, {x, y}]);
                }
            }
        } else {
            playBeep(400, 0.15, 0.1); // Son plouf
        }

        const isWin = checkWin(targetShips, updatedShots);
        const nextTurn = actorNum === 1 ? 2 : 1;

        if (gameMode === 'BOT') {
            if (isBot) setOpponentShots(updatedShots);
            else setMyShots(updatedShots);
            
            if (isWin) {
                setWinner(actorNum);
                setGameState('FINISHED');
            } else {
                setCurrentTurn(nextTurn);
            }
        } else {
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId);
            const updates = { turn: nextTurn };
            if (playerNum === 1) updates.p1Shots = updatedShots;
            else updates.p2Shots = updatedShots;
            
            if (isWin) {
                updates.winner = playerNum;
                updates.status = 'finished';
            }
            await updateDoc(gameRef, updates);
        }
    };

    const activateRadar = () => {
        if (radarCharges > 0 && !isRadarActive && currentTurn === playerNum) {
            setRadarCharges(c => c - 1);
            setIsRadarActive(true);
            playBeep(1200, 0.6, 0.1);
            
            if (radarTimeoutRef.current) clearTimeout(radarTimeoutRef.current);
            radarTimeoutRef.current = setTimeout(() => {
                setIsRadarActive(false);
                setRadarGlow(null);
                setLastBeepCell(null);
            }, 5000); 
        }
    };

    const handleRadarHover = (x, y) => {
        if (!isRadarActive || gameState !== 'PLAYING') return;

        let isClose = false;
        opponentShips.forEach(ship => {
            for (let i = 0; i < ship.length; i++) {
                let sx = ship.direction === 'H' ? ship.x + i : ship.x;
                let sy = ship.direction === 'V' ? ship.y + i : ship.y;
                // Détection de proximité (carré de 3x3)
                if (Math.abs(sx - x) <= 1 && Math.abs(sy - y) <= 1) isClose = true;
            }
        });

        if (isClose) {
            setRadarGlow({x, y});
            if (!lastBeepCell || lastBeepCell.x !== x || lastBeepCell.y !== y) {
                playBeep(1500, 0.08, 0.05); 
                setLastBeepCell({x, y});
            }
        } else {
            setRadarGlow(null);
            setLastBeepCell(null);
        }
    };

    const resetToMenu = () => {
        setGameState('MENU');
        setGameId(null);
        setMyShips([]);
        setMyShots([]);
        setOpponentShips([]);
        setOpponentShots([]);
        setRadarCharges(0);
        setIsRadarActive(false);
        setBotLastHits([]);
    };

    const cancelMatchmaking = async () => {
        if (gameId) {
            try { 
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId)); 
            } catch(e) {}
        }
        resetToMenu();
    };

    // --- Rendus Graphiques ---
    const renderGrid = (isMyGrid) => {
        const grid = [];
        const shots = isMyGrid ? opponentShots : myShots;
        const ships = isMyGrid ? myShips : opponentShips;

        // Optimisation majeure : Pré-calcul des positions O(N) pour éviter la boucle imbriquée coûteuse O(N^2)
        const shotMap = {};
        shots.forEach(s => { shotMap[`${s.x}-${s.y}`] = s; });

        const shipMap = {};
        if (isMyGrid || gameState === 'FINISHED') {
            ships.forEach(s => {
                for (let i = 0; i < s.length; i++) {
                    let sx = s.direction === 'H' ? s.x + i : s.x;
                    let sy = s.direction === 'V' ? s.y + i : s.y;
                    shipMap[`${sx}-${sy}`] = true;
                }
            });
        }

        for (let y = 0; y < mapSize; y++) {
            for (let x = 0; x < mapSize; x++) {
                const isShip = shipMap[`${x}-${y}`];
                const shot = shotMap[`${x}-${y}`];
                
                let bgClass = "bg-transparent border-[0.5px] border-cyan-900/40 hover:bg-cyan-500/20 cursor-crosshair transition-all duration-200 touch-manipulation select-none";
                
                if (isShip) bgClass = "bg-cyan-600/80 shadow-[0_0_8px_rgba(0,255,255,0.4)] border-cyan-400 touch-manipulation select-none";
                if (shot) {
                    if (shot.status === 'hit') bgClass = "bg-red-500/90 shadow-[0_0_15px_rgba(255,0,0,0.8)] border-red-400 animate-pulse z-10 touch-manipulation select-none";
                    else bgClass = "bg-blue-400/30 backdrop-blur-sm border-blue-300/50 touch-manipulation select-none";
                }

                if (!isMyGrid && isRadarActive && radarGlow?.x === x && radarGlow?.y === y) {
                    bgClass += " bg-yellow-400/50 ring-2 ring-yellow-400 shadow-[0_0_20px_rgba(250,204,21,0.8)] z-20 scale-110";
                }

                grid.push(
                    <div 
                        key={`${x}-${y}`} 
                        className={`w-full aspect-square relative flex items-center justify-center ${bgClass}`}
                        onClick={() => !isMyGrid ? handleFire(x, y) : null}
                        onMouseEnter={() => !isMyGrid ? handleRadarHover(x, y) : null}
                        onMouseLeave={() => !isMyGrid ? setRadarGlow(null) : null}
                    >
                        {shot && shot.status === 'hit' && <Flame size={mapSize > 15 ? 12 : 18} className="text-yellow-200 drop-shadow-[0_0_5px_rgba(255,255,255,1)]" />}
                        {shot && shot.status === 'miss' && <Waves size={mapSize > 15 ? 10 : 16} className="text-blue-200/50" />}
                    </div>
                );
            }
        }
        return (
            <div className="relative p-1 bg-[#010b1a]/80 backdrop-blur-md rounded-lg border-2 border-cyan-800/60 shadow-[0_0_30px_rgba(0,200,255,0.1)] overflow-hidden w-full max-w-[450px] mx-auto">
                <div className="absolute inset-0 pointer-events-none opacity-20 radar-sweep"></div>
                <div 
                    className="grid gap-[1px]" 
                    style={{ gridTemplateColumns: `repeat(${mapSize}, minmax(0, 1fr))` }}
                >
                    {grid}
                </div>
            </div>
        );
    };

    const renderPlacementGrid = () => {
        const grid = [];
        
        // Optimisation du pré-calcul pour le placement
        const shipMap = {};
        myShips.forEach(s => {
            for (let i = 0; i < s.length; i++) {
                let sx = s.direction === 'H' ? s.x + i : s.x;
                let sy = s.direction === 'V' ? s.y + i : s.y;
                shipMap[`${sx}-${sy}`] = true;
            }
        });

        const previewMap = {};
        let isHoverValid = false;
        
        if (hoverPos && currentShipIndex < shipsToPlace.length) {
            const currentShip = shipsToPlace[currentShipIndex];
            isHoverValid = isPlacementValid(hoverPos.x, hoverPos.y, currentShip.length, placementDir, myShips);
            for (let i = 0; i < currentShip.length; i++) {
                let sx = placementDir === 'H' ? hoverPos.x + i : hoverPos.x;
                let sy = placementDir === 'V' ? hoverPos.y + i : hoverPos.y;
                previewMap[`${sx}-${sy}`] = true;
            }
        }

        for (let y = 0; y < mapSize; y++) {
            for (let x = 0; x < mapSize; x++) {
                const isShip = shipMap[`${x}-${y}`];
                const inPreview = previewMap[`${x}-${y}`];
                
                let bgClass = "bg-transparent border-[0.5px] border-cyan-900/40 cursor-pointer hover:bg-cyan-900/30 transition-colors touch-manipulation select-none";
                if (isShip) bgClass = "bg-cyan-600/80 shadow-[0_0_8px_rgba(0,255,255,0.4)] border-cyan-400 z-10 touch-manipulation select-none";
                else if (inPreview) {
                    if (isHoverValid) bgClass = "bg-green-500/60 shadow-[0_0_10px_rgba(0,255,0,0.5)] z-20 touch-manipulation select-none";
                    else bgClass = "bg-red-500/60 shadow-[0_0_10px_rgba(255,0,0,0.5)] z-20 touch-manipulation select-none";
                }

                grid.push(
                    <div 
                        key={`${x}-${y}`} 
                        className={`w-full aspect-square relative ${bgClass}`}
                        onClick={() => handleGridClickPlacement(x, y)}
                        onMouseEnter={() => setHoverPos({x, y})}
                        onMouseLeave={() => setHoverPos(null)}
                    ></div>
                );
            }
        }
        return (
            <div className="relative p-1 bg-[#010b1a]/80 backdrop-blur-md rounded-lg border-2 border-cyan-800/60 shadow-[0_0_30px_rgba(0,200,255,0.1)] overflow-hidden w-full max-w-[450px] mx-auto">
                <div 
                    className="grid gap-[1px]" 
                    style={{ gridTemplateColumns: `repeat(${mapSize}, minmax(0, 1fr))` }}
                >
                    {grid}
                </div>
            </div>
        );
    };

    if (!user) {
        return (
            <div className="min-h-screen bg-[#020b14] text-cyan-400 flex flex-col items-center justify-center p-4 font-mono">
                <ShieldQuestion size={64} className="mb-4 animate-pulse drop-shadow-[0_0_15px_rgba(0,255,255,0.5)]" />
                <h1 className="text-xl sm:text-2xl font-bold tracking-widest uppercase text-center">Connexion Sécurisée...</h1>
            </div>
        );
    }

    return (
        <div className="min-h-screen w-full bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-[#020b14] to-black text-cyan-50 font-sans flex flex-col relative overflow-x-hidden">
            
            {/* CSS Personnalisé pour l'animation radar */}
            <style>{`
                @keyframes radar-spin {
                    from { transform: rotate(0deg); }
                    to { transform: rotate(360deg); }
                }
                .radar-sweep {
                    background: conic-gradient(from 0deg at 50% 50%, transparent 70%, rgba(0, 255, 255, 0.4) 100%);
                    animation: radar-spin 4s linear infinite;
                    border-radius: 50%;
                    width: 200%;
                    height: 200%;
                    top: -50%;
                    left: -50%;
                }
            `}</style>

            <header className="bg-[#020d1c]/80 backdrop-blur-lg p-4 border-b border-cyan-900/50 flex flex-wrap items-center justify-between gap-4 shadow-[0_4px_20px_rgba(0,0,0,0.5)] relative z-10 w-full">
                <div className="flex items-center gap-3">
                    <div className="p-2 bg-cyan-950 rounded-lg border border-cyan-800 shrink-0">
                        <Anchor className="text-cyan-400 drop-shadow-[0_0_8px_rgba(0,255,255,0.8)]" size={24} />
                    </div>
                    <h1 className="text-lg sm:text-2xl font-black tracking-widest uppercase text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 drop-shadow-sm truncate">
                        Projet Trident
                    </h1>
                </div>
                {gameState !== 'MENU' && (
                    <button onClick={resetToMenu} className="text-[10px] sm:text-xs uppercase tracking-wider font-bold px-3 py-2 sm:px-4 sm:py-2 bg-red-950/40 text-red-400 hover:bg-red-900/60 border border-red-900/50 rounded-md transition-all shadow-[0_0_10px_rgba(255,0,0,0.1)] whitespace-nowrap touch-manipulation">
                        Abandonner
                    </button>
                )}
            </header>

            <main className="flex-grow flex flex-col items-center justify-center p-3 sm:p-4 md:p-6 w-full max-w-7xl mx-auto relative z-10">
                
                {/* --- ECRAN MENU --- */}
                {gameState === 'MENU' && (
                    <div className="w-full max-w-md bg-[#051329]/80 backdrop-blur-xl p-6 sm:p-8 rounded-2xl shadow-[0_0_40px_rgba(0,0,0,0.8)] border border-cyan-900/50 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent opacity-50"></div>
                        <h2 className="text-xl sm:text-2xl font-black mb-6 sm:mb-8 text-center uppercase tracking-widest text-cyan-400">Salle Tactique</h2>
                        
                        <div className="space-y-5 sm:space-y-6">
                            <div>
                                <label className="block text-[10px] sm:text-xs font-bold text-cyan-600 mb-2 uppercase tracking-widest">Type d'Engagement</label>
                                <div className="grid grid-cols-2 gap-2 sm:gap-3">
                                    <button 
                                        className={`py-3 sm:py-4 rounded-xl flex flex-col items-center gap-2 border transition-all touch-manipulation ${gameMode === 'ONLINE' ? 'border-cyan-400 bg-cyan-900/30 text-cyan-300 shadow-[0_0_15px_rgba(0,255,255,0.2)]' : 'border-slate-800 bg-slate-900/50 text-slate-500 hover:border-slate-700'}`}
                                        onClick={() => setGameMode('ONLINE')}
                                    >
                                        <Zap size={20} className="sm:w-6 sm:h-6" />
                                        <span className="text-xs sm:text-sm font-bold uppercase text-center leading-tight">Multijoueur</span>
                                    </button>
                                    <button 
                                        className={`py-3 sm:py-4 rounded-xl flex flex-col items-center gap-2 border transition-all touch-manipulation ${gameMode === 'BOT' ? 'border-emerald-400 bg-emerald-900/30 text-emerald-300 shadow-[0_0_15px_rgba(16,185,129,0.2)]' : 'border-slate-800 bg-slate-900/50 text-slate-500 hover:border-slate-700'}`}
                                        onClick={() => setGameMode('BOT')}
                                    >
                                        <ShieldAlert size={20} className="sm:w-6 sm:h-6" />
                                        <span className="text-xs sm:text-sm font-bold uppercase text-center leading-tight">I.A. Ennemie</span>
                                    </button>
                                </div>
                            </div>

                            <div>
                                <label className="block text-[10px] sm:text-xs font-bold text-cyan-600 mb-2 uppercase tracking-widest flex items-center gap-2">

                            </div>

                            <div>

                                        <option key={key} value={key}>{mode.name}</option>

                                </select>

                            >
                                <Play size={20} fill="currentColor" />
                                Déployer
                            </button>
                        </div>
                    </div>
                )}

                {/* --- ECRAN MATCHMAKING --- */}

                        <h2 className="text-lg sm:text-xl font-bold uppercase tracking-widest text-cyan-300">Scan des fréquences...</h2>
                        <div className="text-cyan-700 text-xs sm:text-sm font-mono text-center">

                        <button onClick={cancelMatchmaking} className="mt-2 sm:mt-4 px-6 py-2 sm:px-8 sm:py-3 text-[10px] sm:text-xs uppercase tracking-widest font-bold border border-cyan-800 text-cyan-600 rounded-full hover:bg-cyan-950/50 transition touch-manipulation">
                            Interrompre
                        </button>
                    </div>
                )}

                {/* --- ECRAN PLACEMENT --- */}
                {gameState === 'PLACEMENT' && (
                    <div className="flex flex-col lg:flex-row items-center lg:items-start gap-6 lg:gap-8 w-full justify-center">
                        <div className="bg-[#051329]/90 backdrop-blur-xl p-4 sm:p-6 rounded-2xl border border-cyan-900/50 shadow-2xl flex flex-col items-center w-full max-w-md lg:max-w-none lg:w-auto">
                            <h2 className="text-base sm:text-lg font-bold mb-4 sm:mb-6 flex items-center gap-2 sm:gap-3 uppercase tracking-widest text-cyan-400 text-center">
                                <Crosshair size={20} className="shrink-0" />
                                Déploiement Stratégique
                            </h2>
                            <div className="w-full flex justify-center">
                                {renderPlacementGrid()}
                            </div>
                        </div>

                        <div className="w-full max-w-md lg:w-80 bg-[#051329]/90 backdrop-blur-xl p-4 sm:p-6 rounded-2xl border border-cyan-900/50 shadow-2xl flex flex-col gap-4 sm:gap-6">
                            {currentShipIndex < shipsToPlace.length ? (
                                <>
                                    <div className="bg-[#020b14] p-3 sm:p-4 rounded-xl border border-cyan-900/30">
                                        <h3 className="text-cyan-600 text-[10px] sm:text-xs font-bold mb-3 uppercase tracking-widest flex justify-between">
                                            <span>Navire en cours</span>
                                            <span>{currentShipIndex + 1} / {shipsToPlace.length}</span>
                                        </h3>
                                        <div className="flex items-center gap-1 sm:gap-1.5 mb-2 justify-center py-2 sm:py-4 flex-wrap">
                                            {Array(shipsToPlace[currentShipIndex].length).fill(0).map((_, i) => (
                                                <div key={i} className="w-6 h-6 sm:w-8 sm:h-8 bg-cyan-500 rounded-sm shadow-[0_0_10px_rgba(0,255,255,0.5)]"></div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <button 
                                        onClick={() => setPlacementDir(d => d === 'H' ? 'V' : 'H')}
                                        className="flex items-center justify-center gap-2 sm:gap-3 w-full py-3 sm:py-4 bg-cyan-950/40 hover:bg-cyan-900/60 border border-cyan-800 text-cyan-300 rounded-xl transition font-bold uppercase tracking-widest text-xs sm:text-sm touch-manipulation"
                                    >
                                        <RotateCw size={18} className="shrink-0" />
                                        Axe: {placementDir === 'H' ? 'Horiz.' : 'Vertical'}
                                    </button>
                                </>
                            ) : (
                                <div className="flex flex-col items-center text-center gap-4 py-6 sm:py-8">
                                    <div className="w-16 h-16 sm:w-20 sm:h-20 bg-emerald-900/40 rounded-full flex items-center justify-center border border-emerald-500/50 mb-2 relative overflow-hidden">
                                        <div className="absolute inset-0 radar-sweep opacity-30"></div>
                                        <ShieldAlert size={32} className="text-emerald-400 z-10 drop-shadow-[0_0_10px_rgba(16,185,129,0.8)] sm:w-10 sm:h-10" />
                                    </div>
                                    <h3 className="text-base sm:text-lg font-bold text-emerald-400 uppercase tracking-widest">Formation Prête</h3>
                                    <button 
                                        onClick={validatePlacement}
                                        className="w-full py-3 sm:py-4 mt-2 sm:mt-4 bg-emerald-600 hover:bg-emerald-500 text-[#010812] font-black uppercase tracking-widest text-xs sm:text-sm rounded-xl shadow-[0_0_20px_rgba(16,185,129,0.4)] transition-all touch-manipulation"
                                    >
                                        Valider Coordonnées
                                    </button>
                                </div>
                            )}
                            
                            <div className="mt-auto pt-4">
                                <div className="w-full bg-[#020b14] h-1.5 rounded-full mt-2 overflow-hidden border border-cyan-900/30">
                                    <div 
                                        className="h-full bg-cyan-500 shadow-[0_0_10px_rgba(0,255,255,1)] transition-all duration-500 ease-out" 
                                        style={{ width: `${(currentShipIndex / shipsToPlace.length) * 100}%` }}
                                    ></div>
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {/* --- ATTENTE ADVERSAIRE --- */}
                {gameState === 'WAITING_OPPONENT' && (
                    <div className="flex flex-col items-center justify-center gap-4 sm:gap-6 bg-[#051329]/80 backdrop-blur-xl p-8 sm:p-12 rounded-3xl border border-emerald-900/50 shadow-2xl w-full max-w-md mx-auto text-center">
                        <div className="w-12 h-12 sm:w-16 sm:h-16 border-4 border-emerald-500/20 border-t-emerald-400 rounded-full animate-spin mb-2"></div>
                        <h2 className="text-lg sm:text-xl font-bold uppercase tracking-widest text-emerald-400">Position maintenue</h2>
                        <p className="text-cyan-700 font-mono text-xs sm:text-sm">En attente de la confirmation ennemie...</p>
                    </div>
                )}

                {/* --- ECRAN DE JEU (BATAILLE) --- */}
                {(gameState === 'PLAYING' || gameState === 'FINISHED') && (
                    <div className="w-full flex flex-col items-center gap-6 sm:gap-8 max-w-[1000px] mx-auto">
                        
                        {/* Header Bataille */}
                        <div className="w-full flex flex-col sm:flex-row items-center justify-between bg-[#051329]/80 backdrop-blur-md p-3 sm:p-4 rounded-2xl border border-cyan-900/50 shadow-xl gap-4">
                            <div className="flex items-center w-full sm:w-auto justify-center">
                                <div className={`px-4 py-2 sm:px-6 sm:py-3 rounded-xl font-black uppercase tracking-widest text-xs sm:text-sm transition-all duration-300 w-full sm:w-auto text-center ${currentTurn === playerNum ? 'bg-cyan-500/20 text-cyan-300 border border-cyan-400 shadow-[0_0_15px_rgba(0,255,255,0.3)]' : 'bg-transparent text-slate-500 border border-transparent'}`}>
                                    {currentTurn === playerNum ? '► FEU AUTORISÉ' : 'Analyse en cours...'}
                                </div>
                            </div>

                            {/* BONUS RADAR */}
                            <div className="flex items-center gap-3 sm:gap-4 bg-[#020b14] p-2 pr-4 rounded-full border border-cyan-900/30 shrink-0">
                                <button 
                                    onClick={activateRadar}
                                    disabled={radarCharges === 0 || isRadarActive || currentTurn !== playerNum || gameState === 'FINISHED'}
                                    className={`relative flex items-center justify-center w-10 h-10 sm:w-12 sm:h-12 rounded-full border-2 transition-all overflow-hidden shrink-0 touch-manipulation
                                        ${isRadarActive ? 'border-yellow-400 bg-yellow-400/20 shadow-[0_0_20px_rgba(250,204,21,0.5)]' 
                                        : radarCharges > 0 && currentTurn === playerNum ? 'border-yellow-500 bg-yellow-950/40 hover:bg-yellow-900/60 cursor-pointer shadow-[0_0_10px_rgba(250,204,21,0.2)]'
                                        : 'border-slate-800 bg-slate-900 opacity-50 cursor-not-allowed'}`}
                                >
                                    <Search size={18} className={isRadarActive ? "text-yellow-400 animate-pulse" : (radarCharges > 0 ? "text-yellow-500" : "text-slate-600")} />
                                    {isRadarActive && <div className="absolute inset-0 bg-yellow-400/20 animate-ping rounded-full"></div>}
                                </button>
                                <div className="text-[10px] sm:text-xs font-mono text-cyan-600 flex flex-col">
                                    <span className="uppercase tracking-wider">Sonar Tactique</span>
                                    <span>Charges: <b className="text-yellow-400 text-xs sm:text-sm">{radarCharges}</b></span>
                                </div>
                            </div>
                        </div>

                        {/* Grilles */}
                        <div className="flex flex-col md:flex-row gap-6 md:gap-8 xl:gap-12 items-center md:items-start w-full justify-center">
                            
                            {/* Ma Flotte */}
                            <div className="flex flex-col items-center w-full flex-1 max-w-[450px]">
                                <h3 className="text-xs sm:text-sm font-bold mb-2 sm:mb-4 uppercase tracking-widest text-cyan-600">Secteur Allié</h3>
                                <div className="relative w-full">

                                    {gameState === 'PLAYING' && currentTurn !== playerNum && (
                                        <div className="absolute -inset-1 sm:-inset-2 border border-red-500/30 rounded-xl pointer-events-none animate-pulse bg-red-500/5"></div>

                                </div>
                            </div>

                            <div className="hidden md:flex flex-col items-center justify-center self-stretch">
                                <div className="h-full w-[1px] bg-gradient-to-b from-transparent via-cyan-900 to-transparent"></div>
                            </div>

                            {/* Flotte Ennemie */}
                            <div className="flex flex-col items-center w-full flex-1 max-w-[450px]">
                                <h3 className="text-xs sm:text-sm font-bold mb-2 sm:mb-4 uppercase tracking-widest text-red-500/80 flex items-center gap-2">
                                    <Target size={14} className="sm:w-4 sm:h-4"/> Secteur Hostile
                                </h3>
                                <div className="relative w-full">
                                    {renderGrid(false)}
                                    {gameState === 'PLAYING' && currentTurn === playerNum && (
                                        <div className="absolute -inset-1 sm:-inset-2 border border-cyan-500/30 rounded-xl pointer-events-none bg-cyan-500/5"></div>

                                    {isRadarActive && (
                                        <div className="absolute -inset-2 sm:-inset-4 border-2 border-yellow-400/50 rounded-xl sm:rounded-2xl pointer-events-none animate-pulse shadow-[0_0_30px_rgba(250,204,21,0.2)]"></div>

                        <div className="w-full max-w-4xl bg-[#051329]/80 backdrop-blur-md p-4 sm:p-6 rounded-2xl border border-cyan-900/50 shadow-xl flex flex-col xl:flex-row items-center justify-between gap-6">
                            <div className="flex flex-col gap-2 flex-1">
                                <h4 className="text-cyan-400 font-bold uppercase tracking-widest text-sm flex items-center gap-2 justify-center xl:justify-start">

                                    {winner === playerNum ? (
                                        <>
                                            <div className="w-20 h-20 sm:w-24 sm:h-24 bg-cyan-900/40 border border-cyan-400 rounded-full flex items-center justify-center mb-4 sm:mb-6 relative shadow-[0_0_30px_rgba(0,255,255,0.3)]">
                                                <Target size={40} className="text-cyan-400 sm:w-12 sm:h-12" />
                                            </div>
                                            <h2 className="text-3xl sm:text-4xl font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-600 mb-2">VICTOIRE</h2>
                                            <p className="text-cyan-600 font-mono text-xs sm:text-sm mb-6 sm:mb-8">Flotte ennemie neutralisée.</p>
                                        </>
                                    ) : (
                                        <>
                                            <div className="w-20 h-20 sm:w-24 sm:h-24 bg-red-950/40 border border-red-600 rounded-full flex items-center justify-center mb-4 sm:mb-6 relative shadow-[0_0_30px_rgba(255,0,0,0.3)]">
                                                <Anchor size={40} className="text-red-500 sm:w-12 sm:h-12" />
                                            </div>
                                            <h2 className="text-3xl sm:text-4xl font-black uppercase tracking-widest text-red-500 mb-2">DÉFAITE</h2>
                                            <p className="text-red-900 font-mono text-xs sm:text-sm mb-6 sm:mb-8">Votre flotte a été décimée.</p>
                                        </>
                                    )}
                                    <button 
                                        onClick={resetToMenu}
                                        className="w-full py-3 sm:py-4 bg-transparent border border-cyan-600 text-cyan-400 hover:bg-cyan-900/30 font-black uppercase tracking-widest text-sm sm:text-base rounded-xl transition-colors relative z-10 touch-manipulation"
                                    >
                                        Retour Base
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                )}

            </main>
        </div>
    );
}

// --- Montage de l'application dans la page ---
const rootElement = document.getElementById('root');
const root = createRoot(rootElement);
root.render(<BatailleNavale />);
</script>
</body>
</html>
